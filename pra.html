<html lang="en">

<head>

  <style>

    .contents{
      display: grid;
      grid-template-columns: repeat(5,1fr);
    }
.skillGauge {
  position: relative;
  width: 100px;
  height: 100px;
}

/* 캔버스가 박스 안에 꽉 차도록 */
.skillGauge .bigCircle {
  width: 100% !important;
  height: 100% !important;
}

/* 아이콘 가운데 정렬 */
.skillGauge img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 48px; /* 필요하면 조절 */
  height: 48px;
}
  </style>
</head>

<body>

  <div class="contents">

    <div class="skillGauge photo" data-percent="95">
      <img src="./img/svg/skill_photoshop.svg" alt="Photoshop">
      <canvas class="bigCircle"></canvas>

  </div>


  <script>
  $('.skillGauge').each(function () {
  const $gauge = $(this);
  const percent = Number($gauge.data('percent')) || 0; // data-percent 읽기

  const canvas = $gauge.find('.bigCircle')[0];
  if (!canvas) return;

  const ctx = canvas.getContext('2d');

  new Chart(ctx, {
    type: 'pie',
    data: {
      datasets: [{
        data: [percent, 100 - percent], // 앞: 채워진 값, 뒤: 남은 값
        backgroundColor: [
          'rgba(255, 206, 86, 0.9)',   // 채워진 부분
          'rgba(255, 255, 255, 0.05)', // 빈 부분
        ],
        borderWidth: 0
      }]
    },
    options: {
      responsive: false,          // 우리가 width/height 고정했으니까 false
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      }
    }
  });
});
// ===== //스킬 게이지 차트 =====
  </script>
</body>
